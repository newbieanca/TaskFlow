<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dola's To-Do List</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome untuk icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-tasks"></i> To-Do List</h1>
            <p>Kelola tugasmu dengan lebih terorganisir</p>
        </header>

        <!-- Input Form -->
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Tambah tugas baru...">
            <input type="datetime-local" id="deadlineInput">
            <select id="priorityInput">
                <option value="low">Prioritas Rendah</option>
                <option value="medium" selected>Sedang</option>
                <option value="high">Tinggi</option>
            </select>
            <button id="addBtn">Tambah</button>
        </div>

        <!-- Filter & Sort -->
        <div class="controls">
            <div class="filters">
                <button class="filter-btn active" data-filter="all">Semua</button>
                <button class="filter-btn" data-filter="pending">Belum</button>
                <button class="filter-btn" data-filter="completed">Selesai</button>
            </div>
            <div class="sort">
                <select id="sortSelect">
                    <option value="default">Urutkan</option>
                    <option value="priority">Prioritas (Tinggi-Rendah)</option>
                    <option value="date">Tanggal</option>
                </select>
            </div>
        </div>

        <!-- Kalender View -->
        <div class="calendar-section">
            <div class="calendar-nav">
                <button id="prevMonth"><i class="fas fa-chevron-left"></i></button>
                <h3 id="currentMonth"></h3>
                <button id="nextMonth"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div id="calendarGrid"></div>
        </div>

        <!-- Daftar Tugas -->
        <div id="taskList" class="task-list"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
